<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3A8DA3" />
      <stop offset="100%" stop-color="#2A7B91" />
    </linearGradient>
  </defs>
  <!-- Rounded-square brand tile (primary teal-blue) -->
  <rect width="64" height="64" rx="14" fill="url(#bg)" />
  <!-- Compass ring -->
  <circle cx="32" cy="32" r="20" fill="none" stroke="#FFFFFF" stroke-width="2.5" />
  <!-- Four-point compass star -->
  <polygon points="32,16 35.54,28.46 48,32 35.54,35.54 32,48 28.46,35.54 16,32 28.46,28.46" fill="#FFFFFF" />
  <!-- Center pivot -->
  <circle cx="32" cy="32" r="2.4" fill="#2A7B91" />
</svg>
